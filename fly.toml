app = "forex-spread-trading"
primary_region = "ord"

[build]
  dockerfile = "Containerfile"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ Updated environment variables for dual spread strategy               │
# └─────────────────────────────────────────────────────────────────────────────┘
[env]
  # Check every hour - the bot will internally decide which spreads to evaluate
  # based on their timeframe (daily vs weekly)
  POLL_INTERVAL = "3600"
  
  # Position sizing
  TRADE_UNITS = "20000"
  
  # Risk management
  SPREAD_MAX_LOSS_USD = "200"
  
  # Safety
  DRY_RUN = "true"
  CLOSE_ON_SHUTDOWN = "true"

  COINT_CHECK_INTERVAL_HOURS = "24"
  COINT_P_THRESHOLD = "0.05"
  COINT_LOOPBACK_DAYS = "180"

[processes]
  app = "python -u main.py"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[restart]]
  policy = "always"
  retries = 10
  processes = ["app"]
